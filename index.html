<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fruit & Veggie Explorer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="top-bar">
      <h1 id="homeBtn">Fruit & Veggie Explorer</h1>

      <div class="icons">
        <button id="listIcon">☰ My List</button>
        <button id="cartIcon">🛒 Cart</button>
      </div>
    </div>

    <p>Explore grocery items from a live API</p>
  </header>

  <main>
    <div class="controls">
      <input type="text" id="search" placeholder="Search items..." />
      <button id="sortBtn">Sort: A → Z</button>
    </div>

    <div id="items-container"></div>
  </main>

  <footer>
    <p>© 2026 Fruit & Veggie Explorer</p>
  </footer>

  <script src="main.js"></script>
</body>
</html>
